<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question Pool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Serif+Display&family=Syne:wght@400;700&family=Space+Mono&family=Cormorant+Garamond:wght@400;600&family=Cabinet+Grotesk:wght@400;700&family=Inter:wght@400;600&family=Fraunces:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  /* ─── CSS Custom Properties (edit these to retheme) ─── */
  :root {
    --bg: #ffffff;
    --surface: #000000;
    --accent: #db000b;
    --text: #eb0000;
    --text-muted: #7A6E64;
    --border: #D9D0C4;
    --font-display: 'Bebas Neue', cursive;
    --font-body: 'Plus Jakarta Sans', sans-serif;
    --radius:    4px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* ── QUESTION CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    max-width: 640px;
    width: 100%;
    padding: 56px 52px;
    box-shadow: 0 2px 40px rgba(0,0,0,0.06);
    position: relative;
    overflow: hidden;
    animation: fadeUp .5s ease both;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--accent);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .pool-label {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pool-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .question-text {
    font-family: var(--font-display);
    font-size: clamp(1.5rem, 4vw, 2.1rem);
    line-height: 1.35;
    color: var(--text);
    margin-bottom: 48px;
    min-height: 120px;
    display: flex;
    align-items: center;
    transition: opacity .25s ease;
  }
  .question-text.fading { opacity: 0; }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .q-counter {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: .05em;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    background: var(--accent);
    color: #fff;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: opacity .15s, transform .15s;
  }
  .btn:hover { opacity: .88; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn svg { width: 16px; height: 16px; }

  /* ── SETUP PANEL ── */
  .setup-wrap {
    width: 100%;
    max-width: 860px;
    animation: fadeUp .4s ease both;
  }

  .setup-header {
    margin-bottom: 40px;
  }
  .setup-header h1 {
    font-family: var(--font-display);
    font-size: 2.4rem;
    color: var(--text);
    margin-bottom: 6px;
  }
  .setup-header p {
    color: var(--text-muted);
    font-size: 14px;
  }

  .setup-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 32px;
  }
  @media(max-width:600px){ .setup-grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
  }
  .panel h2 {
    font-family: var(--font-display);
    font-size: 1.15rem;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .field input[type=text],
  .field select,
  .field textarea {
    width: 100%;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .field textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
  .field input[type=text]:focus,
  .field select:focus,
  .field textarea:focus { border-color: var(--accent); }

  .color-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .color-item { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .color-item label { font-size: 10px; color: var(--text-muted); }
  .color-item input[type=color] {
    width: 44px; height: 36px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    padding: 2px;
    background: var(--bg);
  }

  .url-field {
    display: flex; gap: 8px;
  }
  .url-field input { flex: 1; }
  .btn-sm {
    padding: 8px 16px;
    font-size: 11px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: var(--font-body);
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    white-space: nowrap;
    transition: opacity .15s;
  }
  .btn-sm:hover { opacity: .85; }

  .qr-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 32px;
  }
  @media(max-width:500px){ .qr-pair { grid-template-columns: 1fr; } }

  .qr-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    text-align: center;
  }
  .qr-box h3 {
    font-family: var(--font-display);
    font-size: 1rem;
    margin-bottom: 16px;
    color: var(--accent);
  }
  .qr-box .qr-img { display: flex; justify-content: center; margin-bottom: 14px; }
  .qr-box .qr-url {
    font-size: 10px;
    color: var(--text-muted);
    word-break: break-all;
    line-height: 1.5;
  }

  .apply-btn {
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
  }

  .tip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 24px;
  }
  .tip strong { color: var(--text); }

  /* ── PRESETS ── */
  .preset-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .preset-chip {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    background: var(--bg);
    color: var(--text-muted);
    transition: all .15s;
    font-family: var(--font-body);
  }
  .preset-chip:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  EDIT YOUR QUESTIONS HERE
// ═══════════════════════════════════════════════════════════
const QUESTIONS = {
  startup: [
    "What problem are you solving, and why is now the right moment?",
    "Who is your ideal customer, and how did you discover them?",
    "What does your unfair advantage look like in 3 years?",
    "What's the riskiest assumption in your business model right now?",
    "Which metric, if doubled, would change everything for you?",
    "What have you had to unlearn since starting this company?",
    "If a competitor had 10× your resources, what would worry you most?",
    "What's the most counterintuitive thing you believe about your market?",
    "Where did your last 10 customers come from, and what does that tell you?",
    "What would need to be true for your startup to be a billion-dollar company?",
    "Describe your biggest pivot — what triggered it, and what did you learn?",
    "Who is NOT your customer, and why is that clarifying?"
  ],
  mentor: [
    "What's the mistake you see early-stage founders repeat most often?",
    "What's the best piece of advice you ignored — and shouldn't have?",
    "How do you know when to push a founder versus when to let them fail?",
    "Tell me about a bet you made that turned out completely wrong.",
    "What's the question founders never ask you, but should?",
    "How has your definition of 'good founder' changed over the years?",
    "What do you look for in a team that numbers and decks can't show?",
    "What's the hardest 'no' you ever gave — and why?",
    "Which sector or model are you most bullish on right now, and why?",
    "What does the first 90 days of great mentorship look like to you?",
    "What's one founder habit that consistently predicts success?",
    "Where do you think most VCs and mentors are still getting it wrong?"
  ]
};

// ═══════════════════════════════════════════════════════════
//  THEME & FONT PRESETS
// ═══════════════════════════════════════════════════════════
const PRESETS = {
  "Warm Paper": {
    bg:"#F5F0E8", surface:"#FFFDF8", accent:"#C8522A", text:"#1A1410", muted:"#7A6E64", border:"#D9D0C4",
    fontDisplay:"'Playfair Display', serif", fontBody:"'Plus Jakarta Sans', sans-serif"
  },
  "Midnight": {
    bg:"#0D0F14", surface:"#161922", accent:"#7B9EFF", text:"#E8EAF0", muted:"#6B7080", border:"#252A35",
    fontDisplay:"'Fraunces', serif", fontBody:"'Space Mono', monospace"
  },
  "Forest": {
    bg:"#EEF2EE", surface:"#F8FAF8", accent:"#3A7A4A", text:"#1A2A1E", muted:"#6A7A6E", border:"#C8D8CC",
    fontDisplay:"'Cormorant Garamond', serif", fontBody:"'Inter', sans-serif"
  },
  "Editorial": {
    bg:"#FAFAFA", surface:"#FFFFFF", accent:"#1A1A1A", text:"#0A0A0A", muted:"#888888", border:"#E0E0E0",
    fontDisplay:"'Syne', sans-serif", fontBody:"'Inter', sans-serif"
  },
  "Terracotta": {
    bg:"#F7EDE3", surface:"#FDF8F4", accent:"#D4503A", text:"#2A1A10", muted:"#8A6A5A", border:"#E8D8CC",
    fontDisplay:"'DM Serif Display', serif", fontBody:"'Plus Jakarta Sans', sans-serif"
  },
};

const FONT_OPTIONS = [
  { label: "Playfair Display", value: "'Playfair Display', serif" },
  { label: "DM Serif Display", value: "'DM Serif Display', serif" },
  { label: "Cormorant Garamond", value: "'Cormorant Garamond', serif" },
  { label: "Fraunces", value: "'Fraunces', serif" },
  { label: "Syne", value: "'Syne', sans-serif" },
  { label: "Bebas Neue", value: "'Bebas Neue', cursive" },
];
const BODY_FONT_OPTIONS = [
  { label: "Plus Jakarta Sans", value: "'Plus Jakarta Sans', sans-serif" },
  { label: "Inter", value: "'Inter', sans-serif" },
  { label: "Space Mono", value: "'Space Mono', monospace" },
];

// ═══════════════════════════════════════════════════════════
//  ROUTING
// ═══════════════════════════════════════════════════════════
const params = new URLSearchParams(location.search);
const pool   = params.get('pool');   // 'startup' | 'mentor'
const setup  = params.get('setup');  // 'true'

if (setup === 'true') {
  renderSetup();
} else if (pool && QUESTIONS[pool]) {
  renderQuestion(pool);
} else {
  // Fallback — show setup hint
  document.getElementById('app').innerHTML = `
    <div style="text-align:center;max-width:440px;padding:40px 24px;">
      <div style="font-family:var(--font-display);font-size:2rem;margin-bottom:16px;">Question Pool</div>
      <p style="color:var(--text-muted);font-size:14px;line-height:1.7;margin-bottom:28px;">
        Add <code style="background:var(--border);padding:2px 6px;border-radius:3px;">?pool=startup</code> or
        <code style="background:var(--border);padding:2px 6px;border-radius:3px;">?pool=mentor</code> to the URL,
        or visit the <a href="?setup=true" style="color:var(--accent);">Setup Panel</a> to configure and generate QR codes.
      </p>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  QUESTION VIEW
// ═══════════════════════════════════════════════════════════
function renderQuestion(pool) {
  const qs = [...QUESTIONS[pool]];
  let current = pickRandom(qs, -1);
  let lastIdx  = qs.indexOf(current);

  const label = pool === 'startup' ? 'Startup Questions' : 'Mentor Questions';

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="card" id="card">
      <div class="pool-label">${label}</div>
      <div class="question-text" id="qtext">${current}</div>
      <div class="card-footer">
        <span class="q-counter" id="qcount">${qs.length} questions in pool</span>
        <button class="btn" id="redraw">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
          </svg>
          New Question
        </button>
      </div>
    </div>`;

  document.getElementById('redraw').addEventListener('click', () => {
    const el = document.getElementById('qtext');
    el.classList.add('fading');
    setTimeout(() => {
      lastIdx = qs.indexOf(current);
      current = pickRandom(qs, lastIdx);
      el.textContent = current;
      el.classList.remove('fading');
    }, 220);
  });
}

function pickRandom(arr, excludeIdx) {
  let idx;
  do { idx = Math.floor(Math.random() * arr.length); } while (idx === excludeIdx && arr.length > 1);
  return arr[idx];
}

// ═══════════════════════════════════════════════════════════
//  SETUP PANEL
// ═══════════════════════════════════════════════════════════
function renderSetup() {
  const app = document.getElementById('app');
  const baseUrl = location.origin + location.pathname;

  app.innerHTML = `
    <div class="setup-wrap">
      <div class="setup-header">
        <h1>Question Pool — Setup</h1>
        <p>Customize your theme, edit questions, and generate QR codes.</p>
      </div>

      <div class="tip">
        <strong>How it works:</strong> Host this single file on any static host (Netlify, GitHub Pages, Vercel — all free).
        Enter your deployed URL below, then print or display the two QR codes.
        Each QR links to <code>yoururl.com/index.html?pool=startup</code> or <code>?pool=mentor</code>.
      </div>

      <!-- URL INPUT -->
      <div class="panel" style="margin-bottom:24px;">
        <h2>Deployed URL</h2>
        <div class="field">
          <label>Your hosted URL (after deployment)</label>
          <div class="url-field">
            <input type="text" id="baseUrl" value="${baseUrl}" placeholder="https://yoursite.netlify.app/index.html">
            <button class="btn-sm" onclick="regenerateQR()">Generate QR</button>
          </div>
        </div>
      </div>

      <!-- QR CODES -->
      <div class="qr-pair">
        <div class="qr-box">
          <h3>Startup QR</h3>
          <div class="qr-img" id="qr-startup"></div>
          <div class="qr-url" id="url-startup"></div>
        </div>
        <div class="qr-box">
          <h3>Mentor QR</h3>
          <div class="qr-img" id="qr-mentor"></div>
          <div class="qr-url" id="url-mentor"></div>
        </div>
      </div>

      <!-- THEME -->
      <div class="setup-grid">
        <div class="panel">
          <h2>Color Theme</h2>
          <div class="field">
            <label>Presets</label>
            <div class="preset-row" id="presets"></div>
          </div>
          <div class="color-row">
            <div class="color-item"><input type="color" id="c-bg"      oninput="applyColor('--bg',this.value)"><label>Background</label></div>
            <div class="color-item"><input type="color" id="c-surface" oninput="applyColor('--surface',this.value)"><label>Card</label></div>
            <div class="color-item"><input type="color" id="c-accent"  oninput="applyColor('--accent',this.value)"><label>Accent</label></div>
            <div class="color-item"><input type="color" id="c-text"    oninput="applyColor('--text',this.value)"><label>Text</label></div>
          </div>
        </div>

        <div class="panel">
          <h2>Typography</h2>
          <div class="field">
            <label>Display Font (headings / questions)</label>
            <select id="font-display" onchange="applyFont('--font-display',this.value)">
              ${FONT_OPTIONS.map(f=>`<option value="${f.value}">${f.label}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label>Body Font (labels / buttons)</label>
            <select id="font-body" onchange="applyFont('--font-body',this.value)">
              ${BODY_FONT_OPTIONS.map(f=>`<option value="${f.value}">${f.label}</option>`).join('')}
            </select>
          </div>
          <div class="field" style="margin-top:12px;">
            <label>Preview</label>
            <div style="font-family:var(--font-display);font-size:1.2rem;color:var(--text);line-height:1.4;">
              What problem are you solving, and why now?
            </div>
          </div>
        </div>
      </div>

      <!-- QUESTIONS -->
      <div class="setup-grid">
        <div class="panel">
          <h2>Startup Questions</h2>
          <div class="field">
            <label>One question per line</label>
            <textarea id="q-startup">${QUESTIONS.startup.join('\n')}</textarea>
          </div>
          <div style="font-size:11px;color:var(--text-muted);">After editing, copy the updated file with the new questions embedded.</div>
        </div>
        <div class="panel">
          <h2>Mentor Questions</h2>
          <div class="field">
            <label>One question per line</label>
            <textarea id="q-mentor">${QUESTIONS.mentor.join('\n')}</textarea>
          </div>
          <div style="font-size:11px;color:var(--text-muted);">After editing, copy the updated file with the new questions embedded.</div>
        </div>
      </div>

      <!-- EXPORT HINT -->
      <div class="panel" style="margin-bottom:32px;">
        <h2>Export Updated File</h2>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;line-height:1.7;">
          After customizing, click below to download a new <code>index.html</code> with your questions and CSS variables baked in.
          Upload this file to your host to replace the old one.
        </p>
        <button class="btn apply-btn" onclick="exportFile()">⬇ Download Customized index.html</button>
      </div>

      <div style="text-align:center;font-size:11px;color:var(--text-muted);padding-bottom:32px;">
        Visit <strong>yoururl.com?setup=true</strong> anytime to update settings.
      </div>
    </div>`;

  // Build presets
  const pr = document.getElementById('presets');
  Object.keys(PRESETS).forEach(name => {
    const chip = document.createElement('button');
    chip.className = 'preset-chip';
    chip.textContent = name;
    chip.onclick = () => applyPreset(name);
    pr.appendChild(chip);
  });

  // Set color pickers to current CSS vars
  setTimeout(() => {
    syncColorPickers();
    generateQR();
  }, 100);
}

function getVar(v) {
  return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
}

function syncColorPickers() {
  const map = { 'c-bg':'--bg','c-surface':'--surface','c-accent':'--accent','c-text':'--text' };
  Object.entries(map).forEach(([id,v]) => {
    const el = document.getElementById(id);
    if (el) el.value = rgbToHex(getVar(v));
  });
}

function rgbToHex(val) {
  if (val.startsWith('#')) return val;
  const m = val.match(/\d+/g);
  if (!m) return '#000000';
  return '#' + m.slice(0,3).map(n=>parseInt(n).toString(16).padStart(2,'0')).join('');
}

function applyColor(varName, value) {
  document.documentElement.style.setProperty(varName, value);
}

function applyFont(varName, value) {
  document.documentElement.style.setProperty(varName, value);
}

function applyPreset(name) {
  const p = PRESETS[name];
  document.documentElement.style.setProperty('--bg', p.bg);
  document.documentElement.style.setProperty('--surface', p.surface);
  document.documentElement.style.setProperty('--accent', p.accent);
  document.documentElement.style.setProperty('--text', p.text);
  document.documentElement.style.setProperty('--text-muted', p.muted);
  document.documentElement.style.setProperty('--border', p.border);
  document.documentElement.style.setProperty('--font-display', p.fontDisplay);
  document.documentElement.style.setProperty('--font-body', p.fontBody);
  syncColorPickers();
  const fd = document.getElementById('font-display');
  const fb = document.getElementById('font-body');
  if (fd) { [...fd.options].forEach(o => { o.selected = o.value === p.fontDisplay; }); }
  if (fb) { [...fb.options].forEach(o => { o.selected = o.value === p.fontBody; }); }
}

let qrInstances = {};
function generateQR() {
  const base = (document.getElementById('baseUrl')?.value || location.origin + location.pathname).replace(/\?.*/, '');
  ['startup','mentor'].forEach(pool => {
    const url = base + '?pool=' + pool;
    const container = document.getElementById('qr-' + pool);
    const urlEl     = document.getElementById('url-' + pool);
    if (!container) return;
    container.innerHTML = '';
    if (qrInstances[pool]) { try { qrInstances[pool].clear(); } catch(e){} }
    qrInstances[pool] = new QRCode(container, {
      text: url, width: 160, height: 160,
      colorDark: getVar('--text') || '#000000',
      colorLight: getVar('--surface') || '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
    if (urlEl) urlEl.textContent = url;
  });
}

function regenerateQR() { generateQR(); }

function exportFile() {
  // Grab current state
  const bg      = getVar('--bg');
  const surface = getVar('--surface');
  const accent  = getVar('--accent');
  const text    = getVar('--text');
  const muted   = getVar('--text-muted');
  const border  = getVar('--border');
  const fontD   = getVar('--font-display');
  const fontB   = getVar('--font-body');

  const startupQs = (document.getElementById('q-startup')?.value || '').split('\n').filter(s=>s.trim()).map(q => JSON.stringify(q)).join(',\n    ');
  const mentorQs  = (document.getElementById('q-mentor')?.value || '').split('\n').filter(s=>s.trim()).map(q => JSON.stringify(q)).join(',\n    ');

  // Read original file and patch
  fetch(location.href.split('?')[0])
    .then(r => r.text())
    .then(html => {
      // Patch CSS vars
      html = html.replace(/--bg:\s*[^;]+;/, `--bg: ${bg};`);
      html = html.replace(/--surface:\s*[^;]+;/, `--surface: ${surface};`);
      html = html.replace(/--accent:\s*[^;]+;/, `--accent: ${accent};`);
      html = html.replace(/--text:\s*[^;]+;/, `--text: ${text};`);
      html = html.replace(/--text-muted:\s*[^;]+;/, `--text-muted: ${muted};`);
      html = html.replace(/--border:\s*[^;]+;/, `--border: ${border};`);
      html = html.replace(/--font-display:[^;]+;/, `--font-display: ${fontD};`);
      html = html.replace(/--font-body:[^;]+;/, `--font-body: ${fontB};`);
      // Patch questions
      html = html.replace(
        /startup:\s*\[[\s\S]*?\],\s*\n\s*mentor:/,
        `startup: [\n    ${startupQs}\n  ],\n  mentor:`
      );
      html = html.replace(
        /mentor:\s*\[[\s\S]*?\]\s*\n\s*\};/,
        `mentor: [\n    ${mentorQs}\n  ]\n};`
      );
      download('index.html', html);
    })
    .catch(() => alert('Export works best when the file is served from a local or hosted server.'));
}

function download(filename, text) {
  const a = document.createElement('a');
  a.href = 'data:text/html;charset=utf-8,' + encodeURIComponent(text);
  a.download = filename;
  a.click();
}
</script>
